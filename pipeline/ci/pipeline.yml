name: Content Pipeline

# OFF until you flip it on: set repo variable PIPELINE_ENABLED=true (Settings >
# Secrets and variables > Actions > Variables). Until then schedule/manual no-op.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "run mode"
        type: choice
        options: [shadow, live]
        default: shadow
  schedule:
    - cron: "0 13 * * *" # 13:00 UTC daily

concurrency:
  group: content-pipeline
  cancel-in-progress: false

jobs:
  run:
    if: ${{ vars.PIPELINE_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # allow the pipeline to commit posts
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        working-directory: pipeline
        run: npm ci
      - name: Run
        working-directory: pipeline
        env:
          STORE_BACKEND: postgres
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IMAGES_ENABLED: "1"
          GIT_BRANCH: master
        run: |
          if [ "${{ github.event.inputs.mode }}" = "live" ]; then npm run run:once; else npm run run:shadow; fi
