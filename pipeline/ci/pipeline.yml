name: Content Pipeline

# Gated by repo variable PIPELINE_ENABLED=true
# (Settings > Secrets and variables > Actions > Variables tab).
# The daily cron publishes LIVE. Manual runs (Actions tab) default to shadow so you
# can preview to the pipeline-shadow branch before anything goes live.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "run mode"
        type: choice
        options: [shadow, backfill, live]
        default: shadow
  schedule:
    - cron: "0 13 * * *" # 13:00 UTC daily — scheduled runs publish LIVE; manual runs default to shadow

concurrency:
  group: content-pipeline
  cancel-in-progress: false

jobs:
  run:
    if: ${{ vars.PIPELINE_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # lets the pipeline commit posts on a live run
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        working-directory: pipeline
        run: npm install --no-audit --no-fund
      - name: Typecheck
        working-directory: pipeline
        run: npm run typecheck
      - name: Run (${{ github.event_name == 'schedule' && 'live' || github.event.inputs.mode || 'shadow' }})
        working-directory: pipeline
        env:
          STORE_BACKEND: postgres
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGES_ENABLED: "1"
          GIT_BRANCH: master
        run: |
          # Scheduled (cron) runs always publish live — that's the daily auto-publish.
          # Manual runs use the dropdown choice (default shadow) so you can test safely.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MODE="live"
          else
            MODE="${{ github.event.inputs.mode || 'shadow' }}"
          fi
          echo "Running in mode: $MODE (event: ${{ github.event_name }})"
          if [ "$MODE" = "backfill" ]; then npm run backfill;
          elif [ "$MODE" = "live" ]; then npm run run:once;
          else npm run run:shadow; fi
