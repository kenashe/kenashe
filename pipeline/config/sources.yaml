# Source registry. Edit freely. tier weights ranking; clustering merges items
# across sources into one "story". type drives which connector ingests it.
#
# types: rss | youtube | arxiv | github_releases | hackernews | reddit
# tier:  1 = primary/authoritative origin, 2 = commentary/community

sources:
  # --- Tier 1: official blogs & changelogs (RSS) ---
  - { name: OpenAI Blog,        type: rss, tier: 1, weight: 1.0, url: "https://openai.com/blog/rss.xml" }
  - { name: Anthropic News,     type: rss, tier: 1, weight: 1.0, url: "https://www.anthropic.com/news/rss.xml" }
  - { name: Google DeepMind,    type: rss, tier: 1, weight: 1.0, url: "https://deepmind.google/blog/rss.xml" }
  - { name: Hugging Face Blog,  type: rss, tier: 1, weight: 0.9, url: "https://huggingface.co/blog/feed.xml" }
  - { name: Meta AI Blog,       type: rss, tier: 1, weight: 0.9, url: "https://ai.meta.com/blog/rss/" }
  - { name: Mistral News,       type: rss, tier: 1, weight: 0.8, url: "https://mistral.ai/news/feed.xml" }

  # --- Tier 1: research & code ---
  - { name: arXiv cs.AI,        type: arxiv,           tier: 1, weight: 0.7, query: "cat:cs.AI",  maxAgeHours: 48 }
  - { name: arXiv cs.CL,        type: arxiv,           tier: 1, weight: 0.7, query: "cat:cs.CL",  maxAgeHours: 48 }
  - { name: arXiv cs.LG,        type: arxiv,           tier: 1, weight: 0.6, query: "cat:cs.LG",  maxAgeHours: 48 }
  - { name: GitHub AI releases, type: github_releases, tier: 1, weight: 0.7, repos: ["openai/openai-python","anthropics/anthropic-sdk-python","ggml-org/llama.cpp","vllm-project/vllm","langchain-ai/langchain"] }

  # --- Tier 2: community signal ---
  - { name: Hacker News (AI),   type: hackernews, tier: 2, weight: 0.8, minPoints: 150, keywords: ["AI","LLM","GPT","Claude","Gemini","model","agent","open source"] }
  - { name: r/LocalLLaMA,       type: reddit, tier: 2, weight: 0.6, subreddit: "LocalLLaMA", minUpvotes: 200 }
  - { name: r/MachineLearning,  type: reddit, tier: 2, weight: 0.6, subreddit: "MachineLearning", minUpvotes: 200 }

